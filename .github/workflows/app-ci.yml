# Reusable CI for Foundation-based apps (beikost-app, packliste-app).
#
# Four parallel jobs gate every PR — all exercising PostgreSQL, the same backend
# as production. SQLite is never used: it hides backend-specific bugs (RETURNING,
# ON CONFLICT, lastrowid) that break writes in prod.
#
#   test     — production Docker image + pytest on PostgreSQL (exact prod env)
#   lint     — mypy type check (fast, no DB)
#   quality  — alembic upgrade-head smoke + pytest coverage threshold
#   e2e      — Playwright browser tests on PostgreSQL (optional via run_e2e)
#
# Callers pass their app name; the DB user/name, image tag, and DSNs derive from
# it. Call with `secrets: inherit` so FOUNDATION_DEPLOY_KEY reaches the submodule
# fetch. Source of truth lives in flowolf86/.github — edit here, not per repo.
#
# Actions-minutes hygiene (all apps merge via squash PR, so the PR run is the
# real gate):
#   * push→master runs are no-ops — every job is gated `event_name != 'push'`,
#     so the merge doesn't re-test code the PR just certified green.
#   * superseded PR commits are cancelled (concurrency, below).
#   * e2e (the single most expensive job) only runs when app/runtime code
#     actually changed — a docs/i18n/config-only PR skips the 6-min browser run.
name: app-ci

on:
  workflow_call:
    inputs:
      app_name:
        description: "App slug — used for the Postgres user/db, image tag, and DSNs (e.g. beikost)."
        required: true
        type: string
      coverage_threshold:
        description: "pytest --cov-fail-under percentage for the quality job."
        required: false
        type: number
        default: 65
      run_e2e:
        description: "Run the Playwright e2e job."
        required: false
        type: boolean
        default: true
      python_version:
        required: false
        type: string
        default: "3.12"
      public_base_url:
        description: "PUBLIC_BASE_URL used by the e2e suite."
        required: false
        type: string
        default: "http://localhost:8089"
    secrets:
      FOUNDATION_DEPLOY_KEY:
        description: "Read-only deploy key for the private foundation submodule."
        required: true
      FOUNDATION_UI_DEPLOY_KEY:
        description: "Read-only deploy key for the private foundation-ui submodule (optional; apps that vendor it)."
        required: false

# Cancel a running CI when a newer commit lands on the same ref (PR branch).
# github.ref is the caller's ref, so pushing 3 commits to a PR no longer runs
# 3 full CIs to completion — the first two are cancelled the moment the next
# arrives. cancel-in-progress is safe here: CI has no deploy/publish side effects.
concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build image & run pytest on PostgreSQL
    # No-op on push→master: the squash-merged code already passed this exact gate
    # on the PR. Re-running it burns minutes to test nothing new.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10  # hard backstop so a hung job can't burn Actions minutes
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ inputs.app_name }}
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ${{ inputs.app_name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.app_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch private submodules (read-only deploy keys)
        env:
          FOUNDATION_DEPLOY_KEY: ${{ secrets.FOUNDATION_DEPLOY_KEY }}
          FOUNDATION_UI_DEPLOY_KEY: ${{ secrets.FOUNDATION_UI_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$FOUNDATION_DEPLOY_KEY" > ~/.ssh/id_foundation
          chmod 600 ~/.ssh/id_foundation
          printf 'Host github.com\n  IdentityFile ~/.ssh/id_foundation\n  IdentitiesOnly yes\n' > ~/.ssh/config
          # Optional 2nd private submodule (foundation-ui): its own deploy key via
          # a host alias so SSH offers the right key per repo. Deploy keys are
          # per-repo, so one key can't reach both. No-op when the secret is unset
          # (apps that don't vendor foundation-ui yet).
          if [ -n "$FOUNDATION_UI_DEPLOY_KEY" ]; then
            printf '%s\n' "$FOUNDATION_UI_DEPLOY_KEY" > ~/.ssh/id_foundation_ui
            chmod 600 ~/.ssh/id_foundation_ui
            printf 'Host github-ui\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/id_foundation_ui\n  IdentitiesOnly yes\n' >> ~/.ssh/config
            git config --global url."github-ui:flowolf86/foundation-ui".insteadOf "git@github.com:flowolf86/foundation-ui"
          fi
          git submodule update --init --recursive

      - name: Syntax-check client JS
        run: |
          shopt -s nullglob   # tolerate apps with no locales/ dir
          for f in app/static/*.js app/static/locales/*.js; do node --check "$f"; done

      - name: Build production image
        run: docker build -t ${{ inputs.app_name }}:latest .

      - name: Run unit tests (pytest on PostgreSQL)
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="postgresql+asyncpg://${{ inputs.app_name }}:test@127.0.0.1:5432/${{ inputs.app_name }}" \
            -e SESSION_SECRET="ci-gate-secret-padded-to-32-chars!!" \
            -e ENVIRONMENT=dev \
            -w /workspace/app \
            ${{ inputs.app_name }}:latest \
            python -m pytest tests/ -q --no-header --tb=short

  lint:
    name: Type check (mypy)
    if: ${{ github.event_name != 'push' }}  # PR is the gate; skip the redundant master re-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch private submodules (read-only deploy keys)
        env:
          FOUNDATION_DEPLOY_KEY: ${{ secrets.FOUNDATION_DEPLOY_KEY }}
          FOUNDATION_UI_DEPLOY_KEY: ${{ secrets.FOUNDATION_UI_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$FOUNDATION_DEPLOY_KEY" > ~/.ssh/id_foundation
          chmod 600 ~/.ssh/id_foundation
          printf 'Host github.com\n  IdentityFile ~/.ssh/id_foundation\n  IdentitiesOnly yes\n' > ~/.ssh/config
          # Optional 2nd private submodule (foundation-ui): its own deploy key via
          # a host alias so SSH offers the right key per repo. Deploy keys are
          # per-repo, so one key can't reach both. No-op when the secret is unset
          # (apps that don't vendor foundation-ui yet).
          if [ -n "$FOUNDATION_UI_DEPLOY_KEY" ]; then
            printf '%s\n' "$FOUNDATION_UI_DEPLOY_KEY" > ~/.ssh/id_foundation_ui
            chmod 600 ~/.ssh/id_foundation_ui
            printf 'Host github-ui\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/id_foundation_ui\n  IdentitiesOnly yes\n' >> ~/.ssh/config
            git config --global url."github-ui:flowolf86/foundation-ui".insteadOf "git@github.com:flowolf86/foundation-ui"
          fi
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          pip install -e "packages/foundation" --quiet
          [ -d packages/foundation-ui ] && pip install -e packages/foundation-ui --quiet || true
          pip install -e "app/[dev]" --quiet

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --exclude 'app/(migrations|e2e|tests)/'

  quality:
    name: Migration smoke test & coverage
    if: ${{ github.event_name != 'push' }}  # PR is the gate; skip the redundant master re-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ inputs.app_name }}
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ${{ inputs.app_name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.app_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch private submodules (read-only deploy keys)
        env:
          FOUNDATION_DEPLOY_KEY: ${{ secrets.FOUNDATION_DEPLOY_KEY }}
          FOUNDATION_UI_DEPLOY_KEY: ${{ secrets.FOUNDATION_UI_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$FOUNDATION_DEPLOY_KEY" > ~/.ssh/id_foundation
          chmod 600 ~/.ssh/id_foundation
          printf 'Host github.com\n  IdentityFile ~/.ssh/id_foundation\n  IdentitiesOnly yes\n' > ~/.ssh/config
          # Optional 2nd private submodule (foundation-ui): its own deploy key via
          # a host alias so SSH offers the right key per repo. Deploy keys are
          # per-repo, so one key can't reach both. No-op when the secret is unset
          # (apps that don't vendor foundation-ui yet).
          if [ -n "$FOUNDATION_UI_DEPLOY_KEY" ]; then
            printf '%s\n' "$FOUNDATION_UI_DEPLOY_KEY" > ~/.ssh/id_foundation_ui
            chmod 600 ~/.ssh/id_foundation_ui
            printf 'Host github-ui\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/id_foundation_ui\n  IdentitiesOnly yes\n' >> ~/.ssh/config
            git config --global url."github-ui:flowolf86/foundation-ui".insteadOf "git@github.com:flowolf86/foundation-ui"
          fi
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          pip install -e "packages/foundation" --quiet
          [ -d packages/foundation-ui ] && pip install -e packages/foundation-ui --quiet || true
          pip install -e "app/[dev]" --quiet

      - name: Migration smoke test (alembic upgrade head)
        env:
          DATABASE_URL: postgresql+asyncpg://${{ inputs.app_name }}:test@localhost:5432/${{ inputs.app_name }}
        working-directory: app
        run: python -m alembic upgrade head

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://${{ inputs.app_name }}:test@localhost:5432/${{ inputs.app_name }}
          SESSION_SECRET: ci-gate-secret-padded-to-32-chars!!
          ENVIRONMENT: dev
        working-directory: app
        run: |
          python -m pytest tests/ -q --no-header --tb=short \
            --cov=. --cov-report=term-missing --cov-fail-under=${{ inputs.coverage_threshold }}

  # Cheap gate for the expensive e2e job: was any app/runtime code touched? A
  # docs-, i18n-, or CI-config-only PR doesn't need a 6-minute browser run.
  # PR-only — on workflow_dispatch we force e2e on (below) without a diff base.
  detect:
    name: Detect app-code changes
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Anything that can change runtime behaviour the browser exercises.
          # Deliberately generous — a false "changed" only costs a run; a false
          # "unchanged" would skip real coverage.
          filters: |
            app:
              - 'app/**'
              - 'packages/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'pytest-e2e.ini'

  e2e:
    name: E2E Tests (Playwright)
    needs: detect
    # always() so a skipped `detect` (workflow_dispatch) doesn't auto-skip e2e.
    # Runs when: e2e enabled AND (manual dispatch OR a PR that touched app code).
    # push→master → none of the branches match → skipped (no redundant re-run).
    if: >-
      ${{ always() && inputs.run_e2e && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.detect.outputs.app == 'true')
      ) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10  # hard backstop; a hung browser test can't burn the budget
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ inputs.app_name }}
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ${{ inputs.app_name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.app_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch private submodules (read-only deploy keys)
        env:
          FOUNDATION_DEPLOY_KEY: ${{ secrets.FOUNDATION_DEPLOY_KEY }}
          FOUNDATION_UI_DEPLOY_KEY: ${{ secrets.FOUNDATION_UI_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$FOUNDATION_DEPLOY_KEY" > ~/.ssh/id_foundation
          chmod 600 ~/.ssh/id_foundation
          printf 'Host github.com\n  IdentityFile ~/.ssh/id_foundation\n  IdentitiesOnly yes\n' > ~/.ssh/config
          # Optional 2nd private submodule (foundation-ui): its own deploy key via
          # a host alias so SSH offers the right key per repo. Deploy keys are
          # per-repo, so one key can't reach both. No-op when the secret is unset
          # (apps that don't vendor foundation-ui yet).
          if [ -n "$FOUNDATION_UI_DEPLOY_KEY" ]; then
            printf '%s\n' "$FOUNDATION_UI_DEPLOY_KEY" > ~/.ssh/id_foundation_ui
            chmod 600 ~/.ssh/id_foundation_ui
            printf 'Host github-ui\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/id_foundation_ui\n  IdentitiesOnly yes\n' >> ~/.ssh/config
            git config --global url."github-ui:flowolf86/foundation-ui".insteadOf "git@github.com:flowolf86/foundation-ui"
          fi
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install app + E2E dependencies
        run: |
          pip install -e "packages/foundation" --quiet
          [ -d packages/foundation-ui ] && pip install -e packages/foundation-ui --quiet || true
          pip install -e "app/[e2e]" --quiet
          # hang guard + flaky-retry; psycopg2 for the cross-stack auth harness'
          # sync schema-wipe / verified-user seeding (foundation.testing.cross_stack_auth).
          pip install pytest-timeout pytest-rerunfailures psycopg2-binary --quiet

      - name: Install Playwright Chromium headless shell
        run: playwright install chromium-headless-shell --with-deps

      # The cross-stack auth e2e (foundation.testing.cross_stack_auth) boots the real
      # Better Auth Node sidecar to drive a real login — so Node + the sidecar's deps
      # must be present. Harmless for apps without a cross-stack test (the harness only
      # starts the sidecar when an app's conftest opts in). Cached by package-lock.
      - name: Set up Node (Better Auth sidecar)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/foundation/auth-service/package-lock.json

      - name: Install Better Auth sidecar deps
        working-directory: packages/foundation/auth-service
        run: npm ci --no-audit --no-fund

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://${{ inputs.app_name }}:test@localhost:5432/${{ inputs.app_name }}
          SESSION_SECRET: e2e-ci-secret-padded-to-32-chars!!
          ENVIRONMENT: dev
          GOOGLE_CLIENT_ID: fake-e2e-client-id
          GOOGLE_CLIENT_SECRET: fake-e2e-secret
          PUBLIC_BASE_URL: ${{ inputs.public_base_url }}
        # --timeout fails a hung test in ~90s (a real test takes <5s) instead of
        # letting the job hang for the full runner limit. thread method works for
        # the sync Playwright API.
        #
        # --reruns retries a test that FAILS on a Playwright/browser/networkidle
        # hang or a dropped connection (the intermittent, environment-only flake
        # documented in LESSONS). --only-rerun scopes the retry to those error
        # signatures, so a genuine assertion failure (a real regression) still
        # fails immediately — no wasted reruns, fast feedback, and a flaky hang
        # can't fail the whole suite.
        run: >-
          python -m pytest app/e2e/ -q --no-header --tb=short -c pytest-e2e.ini
          --timeout=90 --timeout-method=thread
          --reruns 2 --reruns-delay 3
          --only-rerun Timeout --only-rerun TargetClosedError
          --only-rerun 'Connection' --only-rerun 'WebSocket'
          --only-rerun 'net::ERR' --only-rerun 'Navigation'
          --only-rerun 'timed out' --only-rerun 'DB connection'
