# Reusable: pull the canonical standards from this hub into the CALLING repo and
# open a PR there — token-free.
#
# Each consumer repo calls this on a schedule (and on demand). The job fetches
# standards/CONVENTIONS.md + LESSONS.md from the PUBLIC hub (no auth needed) and
# opens/updates a PR in the calling repo using the built-in GITHUB_TOKEN. No PAT,
# no secret, survives a Pro->Free downgrade.
#
# GITHUB_TOKEN permissions are inherited from the caller, so the thin caller
# workflow must grant `contents: write` + `pull-requests: write`. (Also declared
# here for clarity.) Note: PRs opened by GITHUB_TOKEN don't auto-trigger CI —
# fine, these are docs-only.
name: pull-standards

on:
  workflow_call:
    inputs:
      base_branch:
        required: false
        type: string
        default: master

permissions:
  contents: write
  pull-requests: write

jobs:
  pull:
    name: Pull shared standards & open PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the calling repository
        uses: actions/checkout@v5

      - name: Fetch canonical standards from the hub (public, no auth)
        run: |
          mkdir -p .standards
          base="https://raw.githubusercontent.com/flowolf86/.github/master/standards"
          for f in CONVENTIONS.md LESSONS.md I18N.md claude-settings.json agent-lock.sh; do
            curl -fsSL "$base/$f" -o ".standards/$f"
          done
          chmod +x .standards/agent-lock.sh

      - name: Open / update standards-sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automated/sync-standards
          base: ${{ inputs.base_branch }}
          commit-message: "Sync shared conventions & lessons from flowolf86/.github"
          title: "Sync shared conventions & lessons"
          body: |
            Automated pull of the canonical standards from
            [`flowolf86/.github`](https://github.com/flowolf86/.github/tree/master/standards).

            Updates `.standards/CONVENTIONS.md`, `.standards/LESSONS.md`, and `.standards/I18N.md` — the
            files this repo's `CLAUDE.md` imports — plus `.standards/claude-settings.json`,
            the canonical Claude Code permission allowlist (consumed by the
            `install_permissions.py` helper), and `.standards/agent-lock.sh`, the
            shared concurrent-agent publish lease. Edit the source in the hub, not these
            copies. (No-op PR if already in sync.)
          add-paths: .standards/
          delete-branch: true

      # Self-merge: these PRs are a docs-only mirror of the canonical hub, they
      # carry no CI (GITHUB_TOKEN-opened PRs don't trigger workflows) and the
      # consumer repos have no branch protection, so leaving them open just
      # accumulates stale PRs. Squash-merge immediately when there's something to
      # merge (operation is empty/"none" when already in sync → step skipped).
      - name: Auto-merge the standards-sync PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n="${{ steps.cpr.outputs.pull-request-number }}"
          echo "standards-sync PR #$n (${{ steps.cpr.outputs.pull-request-operation }}) — merging"
          # Mergeability is computed asynchronously by GitHub, so the first
          # attempt can race; retry a few times before giving up.
          for i in 1 2 3 4 5 6; do
            if gh pr merge "$n" --squash --delete-branch --repo "${{ github.repository }}"; then
              echo "merged"; exit 0
            fi
            echo "attempt $i not ready; retrying in 5s"; sleep 5
          done
          echo "::error::could not auto-merge standards-sync PR #$n"; exit 1
